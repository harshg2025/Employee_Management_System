<div class="page-wrapper">
  <div class="page-header">
    <div class="header-titles">
      <h2>{{ title }}</h2>
      <p class="subtitle">Enter employee information carefully</p>
    </div>
    <div class="header-actions">
      <button class="btn-secondary" routerLink="/employees">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5"></path>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Cancel
      </button>
    </div>
  </div>

  <div class="form-container glass-container">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="premium-form">

      <div class="form-grid">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input id="firstName" formControlName="firstName" class="form-input" placeholder="e.g. John" />
          <div class="error-text" *ngIf="form.get('firstName')?.invalid && form.get('firstName')?.touched">
            First Name is required.
          </div>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input id="lastName" formControlName="lastName" class="form-input" placeholder="e.g. Doe" />
          <div class="error-text" *ngIf="form.get('lastName')?.invalid && form.get('lastName')?.touched">
            Last Name is required.
          </div>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input id="email" formControlName="email" type="email" class="form-input"
            placeholder="john.doe@company.com" />
          <div class="error-text" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            Please enter a valid email.
          </div>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input id="phone" formControlName="phone" class="form-input" placeholder="+1..." />
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="department">Department</label>
          <input id="department" formControlName="department" class="form-input" placeholder="e.g. Engineering" />
          <div class="error-text" *ngIf="form.get('department')?.invalid && form.get('department')?.touched">
            Department is required.
          </div>
        </div>

        <div class="form-group">
          <label for="salary">Annual Salary</label>
          <div class="input-with-icon">
            <span class="icon">$</span>
            <input id="salary" formControlName="salary" type="number" class="form-input pl-8" placeholder="0.00" />
          </div>
        </div>
      </div>

      <div class="form-group half-width">
        <label for="dateOfJoining">Date Of Joining</label>
        <input id="dateOfJoining" formControlName="dateOfJoining" type="date" class="form-input" />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="form.invalid">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          Save Employee Complete
        </button>
      </div>

    </form>
  </div>
</div>
