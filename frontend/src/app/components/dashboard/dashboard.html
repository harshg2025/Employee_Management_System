<div class="dashboard-wrapper">

  <nav class="top-nav glass-container">
    <div class="brand">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="white">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.03 0-4.43-.82-6.14-2.88C7.55 15.8 9.68 15 12 15s4.45.8 6.14 2.12C16.43 19.18 14.03 20 12 20z" />
        </svg>
      </div>
      <h2>HR Dashboard</h2>
    </div>

    <div class="nav-actions">
      <button class="btn-secondary" (click)="goToEmployees()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        Manage Directory
      </button>
      <button class="btn-danger" (click)="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Logout
      </button>
    </div>
  </nav>

  <main class="dashboard-content">
    <div class="welcome-section">
      <h3>Welcome back, Administrator</h3>
      <p>Here's what's happening in your organization today.</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card glass-container">
        <div class="stat-icon team-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        </div>
        <div class="stat-info">
          <p class="stat-label">Total Employees</p>
          <h2 class="stat-value">{{ employeeCount }}</h2>
        </div>
      </div>

      <div class="stat-card glass-container">
        <div class="stat-icon active-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
        </div>
        <div class="stat-info">
          <p class="stat-label">System Status</p>
          <h2 class="stat-value">Online</h2>
        </div>
      </div>
    </div>
  </main>
</div>
