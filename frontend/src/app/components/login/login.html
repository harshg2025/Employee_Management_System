<div class="login-wrapper">
  <div class="login-container">

    <div class="login-logo">
      <div class="login-icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
        </svg>
      </div>
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Log in to HR Employee Management System</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

      <div class="form-group">
        <label for="username">Admin Username</label>
        <div class="input-wrapper">
          <input id="username" name="username" [(ngModel)]="username" required placeholder="e.g. hradmin"
            autocomplete="username" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input id="password" name="password" type="password" [(ngModel)]="password" required placeholder="••••••••"
            autocomplete="current-password" />
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Secure Login</span>
        <span *ngIf="isLoading">Authenticating...</span>
      </button>

      <div *ngIf="error" class="error-message">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        {{ error }}
      </div>

    </form>
  </div>
</div>
